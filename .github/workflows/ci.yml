name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      # Prove all migrations apply cleanly to an empty database.
      - name: migrate-check
        run: npx prisma migrate deploy
      - run: npm run build
        env:
          # Dummy values — build only needs syntactically valid envs.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CI_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CI_CLERK_SECRET_KEY }}

  e2e:
    runs-on: ubuntu-latest
    needs: checks
    # E2E_DATABASE_URL / E2E_CLERK_USER_EMAIL / E2E_CLERK_USER_PASSWORD are not
    # yet configured as repo secrets — skip gracefully instead of red-X'ing
    # every push until they're added (Settings → Secrets and variables → Actions).
    if: ${{ vars.E2E_ENABLED == 'true' }}
    env:
      # `npm ci`'s postinstall runs `prisma generate`, which (Prisma 7
      # config-based generation) resolves DIRECT_URL even just to generate
      # the client — so this must be set at job level, not only on the
      # seed/test steps.
      DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.E2E_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run db:seed:e2e
        env:
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
      - run: npx playwright test
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CI_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CI_CLERK_SECRET_KEY }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}

  # Applies pending migrations to the real production database. Cloudflare's
  # own Git integration builds and deploys the Worker independently of this
  # workflow, so this job's run and the Worker's build/deploy are NOT strictly
  # ordered relative to each other — every migration must stay backward
  # compatible with the previous app version (expand/contract) until
  # docs/RUNBOOK.md says otherwise.
  migrate:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: checks
    runs-on: ubuntu-latest
    # npm ci's postinstall runs `prisma generate`, which (Prisma 7 config-based
    # generation) resolves DIRECT_URL even just to generate the client — so it
    # must be set at job level, not only on the migrate step.
    env:
      DATABASE_URL: ${{ secrets.PROD_DIRECT_URL }}
      DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: npm }
      - run: npm ci
      - run: npx prisma migrate deploy
